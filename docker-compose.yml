name: "hyperliquid"

# Mainnet non-validator RPC node. Uses Ubuntu 24.04 in the container (host can be Ubuntu 22).
# For Mainnet, ROOT_PEER_IPS is required — comma-separated IPs from https://api.hyperliquid.xyz/info (type: gossipRootIps).
services:
  node:
    restart: unless-stopped
    build:
      context: .
      args:
        CHAIN: Mainnet
    image: hyperliquid-node:mainnet
    ports:
      - "4001-4002:4001-4002"   # gossip (required for p2p)
      - "3001:3001"             # EVM RPC + Info API
    environment:
      CHAIN: Mainnet
      # Required for Mainnet: at least one seed peer (comma-separated). More peers = better chance to sync.
      ROOT_PEER_IPS: "64.31.48.111,64.31.51.137,34.84.25.59,34.146.230.150,52.68.71.160,13.114.116.44,180.189.55.18,52.195.133.97"
    volumes:
      - hl-data:/home/hluser/hl/data

  pruner:
    restart: unless-stopped
    build: ./pruner
    volumes:
      - hl-data:/home/hluser/hl/data


volumes:
  hl-data:
    driver: local
